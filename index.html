<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="description" content="دليل خدمات مدينة القناطر الخيرية - عيادات، صيدليات، مطاعم، وأكثر"/>
  <title>القناطر الخيرية - دليل الخدمات</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="header-top">
        <a href="admin/login.html" class="admin-btn" title="لوحة التحكم">⚙️</a>
        <div class="header-title">
          <h1>القناطر الخيرية</h1>
          <p>دليلك الشامل لخدمات المدينة</p>
        </div>
        <div class="header-icon">🌊</div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن خدمة أو اسم..."/>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="section-title">
      <span class="section-dot"></span>
      <h2>الخدمات المتاحة</h2>
    </div>
    <div class="services-grid" id="servicesGrid"></div>
    <div class="no-results hidden" id="noResults">
      <div class="no-results-icon">🔍</div>
      <p>لا توجد نتائج مطابقة</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>القناطر الخيرية © 2024 | جميع الحقوق محفوظة</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
