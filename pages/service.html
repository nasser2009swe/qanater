<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1B4F72"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="../manifest.json"/>
  <title>القناطر الخيرية - خدمة</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body>
  <header class="header header-sub">
    <div class="header-content">
      <div class="header-top">
        <a href="../index.html" class="back-btn">← رجوع</a>
        <div class="header-title">
          <h1 id="pageTitle">جاري التحميل...</h1>
        </div>
        <div class="header-icon" id="pageIcon">🏷️</div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="chipsSection" class="hidden">
      <div class="chips-container" id="chipsContainer"></div>
    </div>

    <div id="listingsSection">
      <div class="section-title">
        <span class="section-dot"></span>
        <h2 id="listingsTitle">القائمة</h2>
      </div>
      <div class="listings-grid" id="listingsGrid">
        <div class="listing-card skeleton" style="height: 100px;"></div>
        <div class="listing-card skeleton" style="height: 100px;"></div>
        <div class="listing-card skeleton" style="height: 100px;"></div>
      </div>
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">📭</div>
        <p>لا توجد بيانات حتى الآن</p>
        <small>سيتم الإضافة قريباً</small>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-btn">
      <span class="nav-icon">🏠</span><span>الرئيسية</span>
    </a>
    <a href="service.html?id=clinics" class="nav-btn">
      <span class="nav-icon">🏥</span><span>عيادات</span>
    </a>
    <a href="service.html?id=restaurants" class="nav-btn">
      <span class="nav-icon">🍽️</span><span>مطاعم</span>
    </a>
    <a href="service.html?id=pharmacies" class="nav-btn">
      <span class="nav-icon">💊</span><span>صيدليات</span>
    </a>
    <a href="../admin/login.html" class="nav-btn">
      <span class="nav-icon">⚙️</span><span>إدارة</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/service.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Highlight active nav tab based on current service
    document.addEventListener('DOMContentLoaded', () => {
      const id = new URLSearchParams(window.location.search).get('id');
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.href.includes('id=' + id)) btn.classList.add('active');
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/qanater/sw.js').then(reg => {
          console.log('SW registered!', reg);
        }).catch(err => console.log('SW registration failed', err));
      });
    }
  </script>
</body>
</html>
