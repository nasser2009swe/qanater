<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>القناطر الخيرية - تفاصيل</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body>
  <header class="header header-sub">
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="header-top">
        <a id="backBtn" href="javascript:history.back()" class="back-btn">← رجوع</a>
        <div class="header-title">
          <h1 id="detailName">جاري التحميل...</h1>
        </div>
        <div class="header-icon">📋</div>
      </div>
    </div>
  </header>

  <main class="main-content detail-main">
    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
      <div class="profile-img-wrap">
        <div class="profile-img" id="profileImg">👤</div>
      </div>
      <h2 id="profileName"></h2>
      <p class="profile-specialty" id="profileSpecialty"></p>
      <div class="rating-row" id="ratingRow"></div>
    </div>

    <!-- Info Cards -->
    <div class="info-cards" id="infoCards"></div>

    <!-- Action Buttons -->
    <div class="action-buttons" id="actionButtons"></div>
  </main>

  <footer class="footer">
    <p>القناطر الخيرية © 2024</p>
  </footer>

  <script src="../js/detail.js"></script>
</body>
</html>
