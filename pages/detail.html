<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1B4F72"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="../manifest.json"/>
  <title>القناطر الخيرية - تفاصيل</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body>
  <header class="header header-sub">
    <div class="header-content">
      <div class="header-top">
        <a id="backBtn" href="javascript:history.back()" class="back-btn">← رجوع</a>
        <div class="header-title">
          <h1 id="detailName">جاري التحميل...</h1>
        </div>
        <div class="header-icon">📋</div>
      </div>
    </div>
  </header>

  <main class="detail-main">
    <!-- Profile -->
    <div class="profile-card fade-in" id="profileCard">
      <div class="profile-img-wrap">
        <div class="profile-img" id="profileImg">👤</div>
      </div>
      <h2 id="profileName"></h2>
      <p class="profile-specialty" id="profileSpecialty"></p>
      <div class="rating-row" id="ratingRow"></div>
    </div>

    <!-- Info -->
    <div class="info-cards" id="infoCards"></div>

    <!-- Actions -->
    <div class="action-buttons" id="actionButtons"></div>

    <!-- Reviews Section -->
    <div class="reviews-section" style="margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px;">
      <h3 style="margin-bottom: 15px; font-size: 1.2rem;">⭐ آراء الزوار</h3>
      
      <!-- Existing Reviews -->
      <div id="reviewsList" class="reviews-list" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px;">
        <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">جاري تحميل التعليقات...</p>
      </div>

      <!-- Add Review Form -->
      <div id="addReviewBox" class="admin-card" style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px;">
        <h4 style="margin-bottom: 10px; font-size: 1rem;">أضف تقييمك</h4>
        <div class="alert alert-success" id="reviewSuccess" style="display:none; padding: 10px; margin-bottom: 10px; font-size: 0.85rem;">✅ تم إضافة التقييم بنجاح</div>
        <div class="alert alert-error" id="reviewError" style="display:none; padding: 10px; margin-bottom: 10px; font-size: 0.85rem;">❌ يرجى ملء الاسم والتعليق واختيار التقييم</div>
        
        <div class="form-group" style="margin-bottom: 10px;">
          <input type="text" class="form-input" id="reviewName" placeholder="الاسم (اختياري، أو سيظهر كـ زائر)"/>
        </div>
        
        <div class="form-group" style="margin-bottom: 10px;">
          <div class="star-rating-input" id="starRatingInput" style="display: flex; gap: 5px; font-size: 1.8rem; color: rgba(255,255,255,0.2); cursor: pointer; justify-content: center; margin-bottom: 10px;">
            <span data-val="1">★</span><span data-val="2">★</span><span data-val="3">★</span><span data-val="4">★</span><span data-val="5">★</span>
          </div>
          <input type="hidden" id="reviewRatingVal" value="0" />
        </div>

        <div class="form-group" style="margin-bottom: 10px;">
          <textarea class="form-textarea" id="reviewComment" placeholder="اكتب تعليقك هنا..." rows="3"></textarea>
        </div>
        
        <button class="btn-primary" id="submitReviewBtn" onclick="submitReview()" style="width: 100%;">نشر التقييم</button>
      </div>
      
      <!-- Already Reviewed State -->
      <div id="alreadyReviewedBox" class="admin-card" style="display: none; background: rgba(39, 174, 96, 0.1); border: 1px solid rgba(39, 174, 96, 0.3); padding: 15px; border-radius: 12px; text-align: center;">
        <p style="color: #27ae60; margin: 0; font-weight: bold;">شكراً لك! لقد قمت بتقييم هذه الخدمة مسبقاً.</p>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-btn">
      <span class="nav-icon">🏠</span><span>الرئيسية</span>
    </a>
    <a href="service.html?id=clinics" class="nav-btn">
      <span class="nav-icon">🏥</span><span>عيادات</span>
    </a>
    <a href="service.html?id=restaurants" class="nav-btn">
      <span class="nav-icon">🍽️</span><span>مطاعم</span>
    </a>
    <a href="service.html?id=pharmacies" class="nav-btn">
      <span class="nav-icon">💊</span><span>صيدليات</span>
    </a>
    <a href="../admin/login.html" class="nav-btn">
      <span class="nav-icon">⚙️</span><span>إدارة</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/detail.js"></script>
  <script src="../js/ui.js"></script>
</body>
</html>
