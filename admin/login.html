<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول - لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">
  <div class="login-card fade-in">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">لوحة التحكم</h1>
    <p class="login-sub">القناطر الخيرية - دليل الخدمات</p>
    <div class="alert alert-error" id="loginError">❌ اسم المستخدم أو كلمة المرور غير صحيحة</div>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
    <br/><br/>
    <a href="../index.html" style="color:rgba(255,255,255,0.5);font-size:0.82rem;text-decoration:none;">← العودة للموقع</a>
    <br/><br/>
    <a href="../pages/request.html" style="color:var(--accent);font-size:0.9rem;text-decoration:none;font-weight:bold;">📝 طلب إضافة خدمة للموقع</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      
      if (!u || !p) return;

      const btn = document.getElementById('loginBtn');
      btn.textContent = 'جاري تسجيل الدخول...';
      btn.disabled = true;

      // We use email for Supabase auth
      const email = u.includes('@') ? u : `${u}@qanater.com`;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: p
      });

      if (error) {
        btn.textContent = 'تسجيل الدخول';
        btn.disabled = false;
        document.getElementById('loginError').style.display = 'block';
        setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    
    // Check if already logged in
    document.addEventListener('DOMContentLoaded', async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
