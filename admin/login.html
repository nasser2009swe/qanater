<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول - لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">
  <div class="login-card fade-in">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">لوحة التحكم</h1>
    <p class="login-sub">القناطر الخيرية - دليل الخدمات</p>
    <div class="alert alert-error" id="loginError">❌ اسم المستخدم أو كلمة المرور غير صحيحة</div>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
    <br/><br/>
    <a href="../index.html" style="color:rgba(255,255,255,0.5);font-size:0.82rem;text-decoration:none;">← العودة للموقع</a>
  </div>

  <script>
    async function loadConfig() {
      // Check localStorage for admin-changed credentials first
      const stored = localStorage.getItem('qanater_config');
      if (stored) { try { return JSON.parse(stored); } catch(e) {} }
      try {
        const res = await fetch('../data/config.json?t=' + Date.now());
        return await res.json();
      } catch(e) { return { username: 'admin', password: 'qanater2024' }; }
    }

    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const cfg = await loadConfig();
      if (u === cfg.username && p === cfg.password) {
        sessionStorage.setItem('adminAuth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
        setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    if (sessionStorage.getItem('adminAuth') === 'true') window.location.href = 'dashboard.html';
  </script>
</body>
</html>
